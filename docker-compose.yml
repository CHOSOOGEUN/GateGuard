version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: gateguard_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gateguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gateguard1234}
      POSTGRES_DB: ${POSTGRES_DB:-gateguard}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gateguard_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gateguard_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gateguard_celery
    restart: always
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
