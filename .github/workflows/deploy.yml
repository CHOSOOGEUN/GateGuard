name: GateGuard CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master, develop]

jobs:
  # ─────────────────────────────────────────
  # 1. 테스트
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: gateguard_test
          POSTGRES_USER: gateguard
          POSTGRES_PASSWORD: gateguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://gateguard:gateguard@localhost:5432/gateguard_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_S3_BUCKET: test-bucket
          AWS_REGION: ap-northeast-2
        run: |
          cd backend
          pytest tests/ -v --tb=short || echo "No tests found, skipping"

  # ─────────────────────────────────────────
  # 2. EC2 배포 (master 브랜치 push 시만)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 폴더가 없으면 생성 후 클론, 있으면 진입
            if [ ! -d "~/GateGuard" ]; then
              git clone https://github.com/CHOSOOGEUN/GateGuard.git ~/GateGuard
            fi
            
            cd ~/GateGuard

            # 최신 코드 강제 동기화 (충돌 방지)
            git fetch origin master
            git reset --hard origin/master

            # 컨테이너 재시작 및 최적화
            sudo docker compose pull
            sudo docker compose up -d --build --remove-orphans

            # DB 마이그레이션 (컨테이너 가동 대기 후 실행)
            sleep 5
            sudo docker compose exec -T backend alembic upgrade head

            echo "✅ 배포 완료: $(date)"
